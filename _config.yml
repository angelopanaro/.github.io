# Welcome to Jekyll!
#
# This config file is meant for settings that affect your entire site, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# `jekyll serve -l -H localhost`. If you change this file, please restart the 
# server process.

# Basic Site Settings
locale                   : "en-US"
title                    : "Angelo Vito Panaro"
title_separator          : "-"
name                     : &name "Your Name"
description              : &description ""   # Update this with a general description of your site, this is the default if not overridden by a page
url                      : "https://angelopanaro.github.io" # The base hostname & protocol for your site e.g. "https://[your GitHub username].github.io",
                                                           # or if you already have some other page hosted on Github then use "https://[your GitHub username].github.io/[Your Repo Name]"
baseurl                  : "" # the subpath of your site, e.g. "/blog"
repository               : "angelopanaro/angelopanaro.github.io"

# Site Author - The following control what appear as part of the author content on the side bar.
#               If a field is blank the icon and link will not appear, otherwise it will be shown.
#               Additional customization can be done by editing /_includes/author-profile.html
author:
  # Biographic information
  avatar           : "profile.png"
  name             : "Angelo Vito Panaro"
  pronouns         :  # example: "she/her"  
  bio              : "Postdoctoral Researcher, 
  Friedrich-Alexander-University (FAU), Institute of Political Science"
  location         : "Erlangen"
  employer         : 
  uri              :  "https://www.pol.phil.fau.eu/person/angelo-vito-panaro/" # URL
  email            : "angelo.panaro@fau.de" 
  # Academic websites
  googlescholar    : "https://scholar.google.com/citations?user=u8_cqnQAAAAJ&hl=it"
  orcid            : "https://orcid.org/0000-0002-6585-6083"
  researchgate     : "https://www.researchgate.net/profile/Angelo_Vito_Panaro" # URL
  # Social media
  bluesky          : "angelovpanaro.bsky.social" # Replace this with you Bluesky username
  linkedin         : "angelo-vito-panaro-88b66741" # Username

# Theme & Color Mode
theme: "air"
color_mode:
  default: light
  toggle: false  # hides the light/dark toggle

# Publication Categories
publication_category:
  journal_articles:
    title: 'Articles in peer-reviewed journals'
  other_articles:
    title: 'Other Articles'
  books:
    title: 'Book Chapters'
  reviews:
    title: 'Book Reviews'
  working_papers:
    title: 'Working Papers'
  policy_reports:
    title: 'Policy Reports'
  open_pieces:
    title: 'Open Pieces'

# Site Settings
breadcrumbs: false
words_per_minute: 160
future: true
read_more: "disabled"

# Collections
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# Defaults for pages and posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed

# Permalinks
permalink: /:categories/:title/
timezone: Etc/UTC

# Plugins
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# Archives
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development
